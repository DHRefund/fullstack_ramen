version: "3.8"

services:
  postgres:
    image: postgres:15-alpine
    container_name: ramen_db
    environment:
      POSTGRES_DB: ramen_booking
      POSTGRES_USER: sapporo
      POSTGRES_PASSWORD: sapporo123
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "54322:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sapporo -d ramen_booking"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    container_name: ramen_backend
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:54322/ramen_booking
      SPRING_DATASOURCE_USERNAME: sapporo
      SPRING_DATASOURCE_PASSWORD: sapporo123
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build: ./frontend
    container_name: ramen_frontend
    environment:
      - REACT_APP_API_URL=http://localhost:8080
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  postgres_data:
